name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - run: npm test

      - name: Verify bundle shebang (POSIX)
        if: runner.os != 'Windows'
        run: head -n 1 dist/cli.cjs | grep -q '^#!/usr/bin/env node'

      - name: Verify bundle shebang (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $line = Get-Content dist/cli.cjs -First 1
          if ($line -ne '#!/usr/bin/env node') { throw "Missing shebang: $line" }
